name: CodeQL

# Análisis estático de seguridad (SAST) con CodeQL para el código Python.
# Los resultados aparecen en la pestaña Security > Code scanning del repositorio.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Semanal (lunes 07:00 UTC): detecta nuevas alertas aunque no haya commits.
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # necesario para subir los resultados de CodeQL
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
