name: CI

# Integración continua para kwhisper.
# Nota: los tests son PUROS (sin GPU/CUDA, sin Wayland, sin Ollama), así que el
# CI NO instala el stack pesado (faster-whisper, ctranslate2, nvidia-*, PySide6).
# Solo instala las dependencias ligeras que los tests importan de verdad.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

# Cancela ejecuciones antiguas de la misma rama/PR cuando llega un push nuevo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permisos mínimos por defecto (buena práctica de seguridad en open source).
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint + formato (ruff)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Ruff check (lint)
        run: ruff check --output-format=github .

      # Informativo: el código aún no está formateado con ruff format. No bloquea
      # el CI; muestra el diff sugerido. Quita 'continue-on-error' cuando quieras
      # hacerlo obligatorio (tras ejecutar 'ruff format .' una vez).
      - name: Ruff format (check, informativo)
        continue-on-error: true
        run: ruff format --check --diff .

  # ---------------------------------------------------------------------------
  # Tests unitarios en varias versiones de Python
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        # Dependencias ligeras que importan los tests (sin GPU/CUDA/PySide6).
        # evdev se compila desde sdist; gcc y las cabeceras ya vienen en ubuntu.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pydantic platformdirs httpx evdev

      - name: Run pytest
        run: pytest

  # ---------------------------------------------------------------------------
  # Construcción y validación del paquete (sdist + wheel)
  # ---------------------------------------------------------------------------
  build:
    name: Build & check package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
